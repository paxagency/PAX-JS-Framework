<!DOCTYPE html>
<html>
    <head>
        <title>Website</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <style>
            .strike {text-decoration: line-through;}ul {list-style-type:none;padding:0;}
        </style>
    </head>
    <body>
        <div app='home'>
            <h1 bind='title'></h1>
            <ul bind='todos'></ul>
            <h4 class='message' show="!todos.length">There are no items to do.</h4>
            <input bind='inp' type='text' /><button onclick='pax.home.add()'>Add this</button>
            <br /><br /><button onclick='pax.print(pax.home.data.todos)'>Save Data</button>
        </div>
    </body>  
 <script src="../dist/pax.js"></script>
 <script>
    pax.app('home', {
        data:{
            title:'My List',
            todos: [
                {text:'Learn JavaScript',done:0},
                {text:'Learn Pax',done:0},
                {text:'Build something awesome',done:1}
            ],
            inp:''
        },
        templates:{
            todos:`<li data-index='{{index}}' class='{{home.getClass()}}'> 
                <label><input type='checkbox'  
                    onchange='pax.home.updateTodos(this)' 
                    attr:checked="this.done" />   
                    {{this.text}} 
                    <button onclick='pax.home.pop("todos",{{index}})'>x</button>
                    </label></li>`
        },
        add:function(){
            this.push('todos',{text:this.data.inp,done:0},0);
            this.set('inp','');
        },
        getClass:function(n,o){return (o.done==1) ? 'strike' : '';},
        
        updateTodos: function(checkbox) {
			var li = checkbox.closest('li');
			var index = parseInt(li.getAttribute('data-index'), 10);
			this.data.todos[index].done = checkbox.checked ? 1 : 0;
			this.data.todos.sort(function(a, b) {
			  	return a.done - b.done;
			});
			this.render('todos');
	   }
    });
 </script> 

</html>
